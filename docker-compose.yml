services:
  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - SCHOLAR_ENV=${SCHOLAR_ENV:-production}
      - SCHOLAR_API_KEYS=${SCHOLAR_API_KEYS:-demo-key:tenant_demo:user_demo}
      - SCHOLAR_MYSQL_URL=${SCHOLAR_MYSQL_URL:-mysql://scholar:scholar@db:3306/scholar_agent?charset=utf8mb4}
      - SCHOLAR_REDIS_URL=${SCHOLAR_REDIS_URL:-redis://redis:6379/0}
      - SCHOLAR_TASK_EXECUTION_MODE=queue
      - SCHOLAR_CHECKPOINT_BACKEND=sqlite
      - SCHOLAR_ALLOW_MOCK_DATA=${SCHOLAR_ALLOW_MOCK_DATA:-false}
      - SCHOLAR_EXTERNAL_SOURCE_PROVIDER=${SCHOLAR_EXTERNAL_SOURCE_PROVIDER:-real}
      - SCHOLAR_PRIMARY_MODEL_PROVIDER=${SCHOLAR_PRIMARY_MODEL_PROVIDER:-none}
      - SCHOLAR_SECONDARY_MODEL_PROVIDER=${SCHOLAR_SECONDARY_MODEL_PROVIDER:-none}
      - SCHOLAR_LLM_BASE_URL=${SCHOLAR_LLM_BASE_URL:-}
      - SCHOLAR_LLM_API_KEY=${SCHOLAR_LLM_API_KEY:-}
      - SCHOLAR_LLM_MODEL=${SCHOLAR_LLM_MODEL:-}
      - SCHOLAR_ANTHROPIC_BASE_URL=${SCHOLAR_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - SCHOLAR_ANTHROPIC_API_KEY=${SCHOLAR_ANTHROPIC_API_KEY:-}
      - SCHOLAR_ANTHROPIC_MODEL=${SCHOLAR_ANTHROPIC_MODEL:-}
      - SCHOLAR_RAG_EMBEDDING_PROVIDER=${SCHOLAR_RAG_EMBEDDING_PROVIDER:-lexical}
      - SCHOLAR_MCP_URL=http://mcp_server:8001/mcp/
      - SCHOLAR_MCP_TOKEN=${SCHOLAR_MCP_TOKEN:-}
      - SCHOLAR_BROWSER_WORKER_URL=http://browser_worker:8002
      - SCHOLAR_BROWSER_WORKER_TOKEN=${SCHOLAR_BROWSER_WORKER_TOKEN:-}
      - SCHOLAR_STORAGE_DIR=/app/storage/runtime
      - SCHOLAR_UPLOAD_DIR=/app/storage/uploads
    volumes:
      - scholar_storage:/app/storage
    networks:
      - scholar_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp_server:
        condition: service_healthy
      browser_worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - scholar_network

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      - SCHOLAR_ENV=${SCHOLAR_ENV:-production}
      - SCHOLAR_API_KEYS=${SCHOLAR_API_KEYS:-demo-key:tenant_demo:user_demo}
      - SCHOLAR_MYSQL_URL=${SCHOLAR_MYSQL_URL:-mysql://scholar:scholar@db:3306/scholar_agent?charset=utf8mb4}
      - SCHOLAR_REDIS_URL=${SCHOLAR_REDIS_URL:-redis://redis:6379/0}
      - SCHOLAR_TASK_EXECUTION_MODE=queue
      - SCHOLAR_CHECKPOINT_BACKEND=sqlite
      - SCHOLAR_ALLOW_MOCK_DATA=${SCHOLAR_ALLOW_MOCK_DATA:-false}
      - SCHOLAR_EXTERNAL_SOURCE_PROVIDER=${SCHOLAR_EXTERNAL_SOURCE_PROVIDER:-real}
      - SCHOLAR_PRIMARY_MODEL_PROVIDER=${SCHOLAR_PRIMARY_MODEL_PROVIDER:-none}
      - SCHOLAR_SECONDARY_MODEL_PROVIDER=${SCHOLAR_SECONDARY_MODEL_PROVIDER:-none}
      - SCHOLAR_LLM_BASE_URL=${SCHOLAR_LLM_BASE_URL:-}
      - SCHOLAR_LLM_API_KEY=${SCHOLAR_LLM_API_KEY:-}
      - SCHOLAR_LLM_MODEL=${SCHOLAR_LLM_MODEL:-}
      - SCHOLAR_ANTHROPIC_BASE_URL=${SCHOLAR_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - SCHOLAR_ANTHROPIC_API_KEY=${SCHOLAR_ANTHROPIC_API_KEY:-}
      - SCHOLAR_ANTHROPIC_MODEL=${SCHOLAR_ANTHROPIC_MODEL:-}
      - SCHOLAR_RAG_EMBEDDING_PROVIDER=${SCHOLAR_RAG_EMBEDDING_PROVIDER:-lexical}
      - SCHOLAR_STORAGE_DIR=/app/storage/runtime
      - SCHOLAR_UPLOAD_DIR=/app/storage/uploads
      - SCHOLAR_MCP_URL=http://mcp_server:8001/mcp/
      - SCHOLAR_MCP_TOKEN=${SCHOLAR_MCP_TOKEN:-}
    volumes:
      - scholar_storage:/app/storage
    networks:
      - scholar_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp_server:
        condition: service_healthy

  mcp_server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile.mcp
    environment:
      - SCHOLAR_ENV=development
      - SCHOLAR_MYSQL_URL=${SCHOLAR_MYSQL_URL:-mysql://scholar:scholar@db:3306/scholar_agent?charset=utf8mb4}
      - SCHOLAR_ALLOW_MOCK_DATA=${SCHOLAR_ALLOW_MOCK_DATA:-false}
      - SCHOLAR_EXTERNAL_SOURCE_PROVIDER=${SCHOLAR_EXTERNAL_SOURCE_PROVIDER:-real}
      - SCHOLAR_STORAGE_DIR=/app/storage/runtime
      - SCHOLAR_MCP_TOKEN=${SCHOLAR_MCP_TOKEN:-}
      - SCHOLAR_MCP_HOST=0.0.0.0
      - SCHOLAR_MCP_PORT=8001
    ports:
      - "8001:8001"
    volumes:
      - scholar_storage:/app/storage
    networks:
      - scholar_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',8001),3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 8

  browser_worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile.browser
    environment:
      - SCHOLAR_STORAGE_DIR=/app/storage/runtime
      - SCHOLAR_BROWSER_CHANNEL=
      - SCHOLAR_BROWSER_WORKER_TOKEN=${SCHOLAR_BROWSER_WORKER_TOKEN:-}
      - SCHOLAR_BROWSER_IDLE_TIMEOUT_SECONDS=${SCHOLAR_BROWSER_IDLE_TIMEOUT_SECONDS:-3600}
    ports:
      - "8002:8002"
    volumes:
      - scholar_storage:/app/storage
    networks:
      - scholar_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8

  redis:
    restart: unless-stopped
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - scholar_network
    command: redis-server --appendonly yes
    volumes:
      - scholar_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  db:
    restart: unless-stopped
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-scholar_root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-scholar_agent}
      - MYSQL_USER=${MYSQL_USER:-scholar}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-scholar}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - scholar_mysql:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/01-scholar-init.sql:ro
    networks:
      - scholar_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  scholar_storage:
  scholar_mysql:
  scholar_redis:

networks:
  scholar_network:
    driver: bridge
